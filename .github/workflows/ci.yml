name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Checkout cloud-lite-core
        uses: actions/checkout@v4
        with:
          repository: Elsayed91/cloud-lite-core-rs
          path: ../cloud-lite-core
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings
      - run: cargo test --lib

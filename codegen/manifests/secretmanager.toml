# Secret Manager API - Codegen Manifest
# Curated for Secret CRUD operations (no versions, no IAM for now)

[api]
name = "secretmanager"
display_name = "Secret Manager"
version = "v1"
discovery_url = "https://www.googleapis.com/discovery/v1/apis/secretmanager/v1/rest"
base_url = "https://secretmanager.googleapis.com"
doc_url = "https://cloud.google.com/secret-manager/"

[api.client]
accessor_name = "secret_manager"
client_struct = "SecretManagerClient"

# No LRO section - all Secret CRUD operations are synchronous

# --- Types ---

[[types]]
schema = "Secret"
include_fields = ["name", "labels", "annotations", "etag", "replication", "createTime", "expireTime", "rotation"]

[types.field_overrides]
name = { required = true }

[types.omitted]
customerManagedEncryption = "CMEK support - advanced feature"
topics = "Pub/Sub integration - uncommon use case"
ttl = "TTL input field - rarely used directly"
versionAliases = "Version aliasing - requires version operations"
versionDestroyTtl = "Delayed destruction - advanced feature"
tags = "Resource tags - uncommon use case"

[[types]]
schema = "Replication"
# Replication policy (automatic or user-managed)

[[types]]
schema = "Automatic"
# Automatic replication policy

[[types]]
schema = "UserManaged"
# User-managed replication with specific replicas

[[types]]
schema = "Replica"
# Single replica configuration

[[types]]
schema = "CustomerManagedEncryption"
# CMEK configuration for encryption

[[types]]
schema = "Rotation"
# Rotation schedule configuration

[[types]]
schema = "ListSecretsResponse"
# No include_fields = use all fields (secrets, nextPageToken, totalSize)

[[types]]
schema = "Empty"
# Empty type for delete response

# --- Operations ---
# Project-level Secret CRUD operations only (no versions, no IAM, no locations)

[[operations]]
discovery_method = "projects.secrets.create"
rust_name = "create_secret"
description = "Creates a new Secret containing no SecretVersions."
query_params = ["secretId"]

[[operations]]
discovery_method = "projects.secrets.get"
rust_name = "get_secret"
description = "Gets metadata for a given Secret."

[[operations]]
discovery_method = "projects.secrets.list"
rust_name = "list_secrets"
description = "Lists Secrets."
list_response = { type_name = "ListSecretsResponse", items_field = "secrets", item_type = "Secret" }
query_params = ["filter", "pageSize", "pageToken"]

[[operations]]
discovery_method = "projects.secrets.patch"
rust_name = "patch_secret"
description = "Updates metadata of an existing Secret."
query_params = ["updateMask"]

[[operations]]
discovery_method = "projects.secrets.delete"
rust_name = "delete_secret"
description = "Deletes a Secret."
query_params = ["etag"]
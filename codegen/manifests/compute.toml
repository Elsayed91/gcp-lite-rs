# Compute Engine API - Codegen Manifest
# Defines which types and operations to generate from the GCP discovery document.

[api]
name = "compute"
display_name = "Compute Engine"
version = "v1"
discovery_url = "https://www.googleapis.com/discovery/v1/apis/compute/v1/rest"
base_url = "https://compute.googleapis.com/compute/v1"
doc_url = "https://cloud.google.com/compute/docs/reference/rest/v1"

[api.client]
accessor_name = "compute"
client_struct = "ComputeClient"

[api.lro]
pattern = "selflink"
response_type = "OperationResponse"
poll_config = "disk_operation"

# --- Types ---

[[types]]
schema = "Disk"
include_fields = [
    "name", "sizeGb", "type", "zone", "status", "selfLink",
    "sourceSnapshot", "sourceImage", "id", "creationTimestamp",
    "description", "labels", "labelFingerprint", "physicalBlockSizeBytes",
    "users", "lastAttachTimestamp", "lastDetachTimestamp",
    "enableConfidentialCompute", "provisionedIops",
    "diskEncryptionKey", "guestOsFeatures", "resourcePolicies",
    "region", "replicaZones", "kind",
]

[types.field_overrides]
name = { required = true }
type = { rust_name = "disk_type", serde_rename = "type" }
status = { enum_type = "DiskStatus" }

[types.omitted]
sourceDisk = "Source disk cloning - uncommon operation"
sourceImageEncryptionKey = "CMEK for source image - niche use case"
sourceSnapshotEncryptionKey = "CMEK for source snapshot - niche use case"
sourceStorageObject = "Import from Cloud Storage - niche use case"
licenseCodes = "License tracking - read-only metadata"
licenses = "License tracking - read-only metadata"
satisfiesPzs = "Placement zone storage - enterprise feature"
satisfiesPzi = "Placement zone isolation - enterprise feature"
provisionedThroughput = "Hyperdisk throughput provisioning"
resourceStatus = "Async replication status - niche feature"

[[types]]
schema = "CustomerEncryptionKey"
rust_name = "DiskEncryptionKey"
include_fields = ["rawKey", "kmsKeyName", "sha256"]

[[types]]
schema = "GuestOsFeature"
include_fields = ["type"]

[types.field_overrides]
type = { rust_name = "feature_type", serde_rename = "type" }

[[types]]
schema = "Instance"
include_fields = [
    "name", "canIpForward", "confidentialInstanceConfig", "cpuPlatform",
    "creationTimestamp", "deletionProtection", "description", "disks",
    "displayDevice", "fingerprint", "id", "keyRevocationActionType",
    "kind", "labelFingerprint", "labels", "lastStartTimestamp",
    "lastStopTimestamp", "machineType", "metadata", "networkInterfaces",
    "reservationAffinity", "satisfiesPzi", "scheduling", "selfLink",
    "serviceAccounts", "shieldedInstanceConfig",
    "shieldedInstanceIntegrityPolicy", "sourceMachineImage",
    "startRestricted", "status", "tags", "zone",
]

[types.field_overrides]
name = { required = true }
status = { enum_type = "InstanceStatus" }

[types.omitted]
advancedMachineFeatures = "Advanced CPU/NUMA features"
guestAccelerators = "GPU attachment - use dedicated GPU API"
params = "Resource manager tags - niche"
resourcePolicies = "Scheduled operations - niche"
resourceStatus = "Scheduling/physical host status"
sourceMachineImageEncryptionKey = "CMEK for machine images"

[[types]]
schema = "AttachedDisk"
include_fields = [
    "architecture", "autoDelete", "boot", "deviceName", "diskSizeGb",
    "guestOsFeatures", "index", "interface", "kind", "licenses",
    "mode", "source", "type",
]

[types.field_overrides]
interface = { rust_name = "interface_type", serde_rename = "interface" }
type = { rust_name = "disk_type", serde_rename = "type" }

[[types]]
schema = "NetworkInterface"
include_fields = [
    "accessConfigs", "fingerprint", "kind", "name", "network",
    "networkIP", "stackType", "subnetwork",
]

[[types]]
schema = "AccessConfig"
include_fields = ["kind", "name", "natIP", "networkTier", "type"]

[types.field_overrides]
type = { rust_name = "access_type", serde_rename = "type" }

[[types]]
schema = "Metadata"
include_fields = ["fingerprint", "items"]

[types.field_overrides]
items = { inline_struct = "MetadataItem" }

[[types]]
schema = "Tags"
include_fields = ["items", "fingerprint"]

[[types]]
schema = "ServiceAccount"
include_fields = ["email", "scopes"]

[types.field_overrides]
email = { required = true }

[[types]]
schema = "Scheduling"
include_fields = [
    "automaticRestart", "instanceTerminationAction",
    "onHostMaintenance", "preemptible", "provisioningModel",
]

[[types]]
schema = "Snapshot"
include_fields = [
    "name", "autoCreated", "chainName", "creationSizeBytes",
    "creationTimestamp", "description", "diskSizeGb", "downloadBytes",
    "enableConfidentialCompute", "guestOsFeatures", "id", "kind",
    "labelFingerprint", "labels", "licenseCodes", "licenses",
    "selfLink", "snapshotEncryptionKey", "snapshotType", "sourceDisk",
    "sourceDiskEncryptionKey", "sourceDiskId", "status",
    "storageBytes", "storageBytesStatus", "storageLocations",
]

[types.field_overrides]
name = { required = true }
status = { enum_type = "SnapshotStatus" }

[[types]]
schema = "Operation"
rust_name = "OperationResponse"
include_fields = ["name", "operationType", "status", "targetLink", "selfLink"]

[types.field_overrides]
name = { required = true }

# --- Address Types ---

[[types]]
schema = "Address"
include_fields = [
    "name", "address", "addressType", "creationTimestamp", "description",
    "id", "kind", "labels", "labelFingerprint", "network", "networkTier",
    "prefixLength", "purpose", "region", "selfLink", "status",
    "subnetwork", "users",
]

[types.field_overrides]
name = { required = true }
status = { enum_type = "AddressStatus" }

# --- Router Types ---

[[types]]
schema = "Router"
include_fields = [
    "name", "creationTimestamp", "description", "id", "kind",
    "nats", "network", "region", "selfLink",
]

[types.field_overrides]

[[types]]
schema = "RouterNat"
include_fields = [
    "name", "natIpAllocateOption", "sourceSubnetworkIpRangesToNat",
    "natIps", "drainNatIps", "minPortsPerVm", "maxPortsPerVm",
    "enableEndpointIndependentMapping", "enableDynamicPortAllocation",
    "logConfig", "type", "autoNetworkTier", "subnetworks",
    "udpIdleTimeoutSec", "tcpEstablishedIdleTimeoutSec",
    "tcpTransitoryIdleTimeoutSec", "tcpTimeWaitTimeoutSec",
    "icmpIdleTimeoutSec", "endpointTypes",
]

[types.field_overrides]
name = { required = true }
type = { rust_name = "nat_type", serde_rename = "type" }

[[types]]
schema = "RouterNatLogConfig"
include_fields = ["enable", "filter"]

[[types]]
schema = "RouterNatSubnetworkToNat"
include_fields = ["name", "sourceIpRangesToNat", "secondaryIpRangeNames"]

# --- Backend Service Types ---

[[types]]
schema = "BackendService"
include_fields = [
    "name", "backends", "creationTimestamp", "description", "fingerprint",
    "healthChecks", "id", "kind", "loadBalancingScheme", "logConfig",
    "network", "port", "portName", "protocol", "region", "selfLink",
    "sessionAffinity", "timeoutSec", "connectionDraining",
]

[types.field_overrides]
name = { required = true }

[types.omitted]
cdnPolicy = "CDN configuration - advanced feature"
circuitBreakers = "Traffic management - advanced"
consistentHash = "Session affinity - advanced"
customRequestHeaders = "Custom headers - advanced"
customResponseHeaders = "Custom headers - advanced"
failoverPolicy = "Failover - enterprise feature"
iap = "Identity-Aware Proxy - separate concern"
localityLbPolicies = "Advanced load balancing"
outlierDetection = "Traffic management - advanced"
securityPolicy = "Security policy - separate concern"
securitySettings = "mTLS - advanced"
subsetting = "Subsetting - advanced"
tlsSettings = "Backend TLS - advanced"

[[types]]
schema = "Backend"
include_fields = [
    "balancingMode", "capacityScaler", "description", "failover",
    "group", "maxConnections", "maxConnectionsPerEndpoint",
    "maxConnectionsPerInstance", "maxRate", "maxRatePerEndpoint",
    "maxRatePerInstance", "maxUtilization",
]

[[types]]
schema = "BackendServiceLogConfig"
include_fields = ["enable", "sampleRate"]

[[types]]
schema = "ConnectionDraining"
include_fields = ["drainingTimeoutSec"]

# --- Firewall Types ---

[[types]]
schema = "Firewall"
include_fields = [
    "name", "description", "network", "direction", "priority",
    "allowed", "denied", "sourceRanges", "destinationRanges",
    "sourceTags", "targetTags", "sourceServiceAccounts",
    "targetServiceAccounts", "disabled", "selfLink", "id",
    "creationTimestamp", "kind",
]

[types.field_overrides]
name = { required = true }
direction = { enum_type = "FirewallDirection" }
allowed = { inline_struct = "FirewallAllowed" }
denied = { inline_struct = "FirewallDenied" }

[types.omitted]
logConfig = "Firewall logging config - can add later"
params = "Resource manager tags - niche"

# --- Request Types ---

[[types]]
schema = "DisksResizeRequest"
include_fields = ["sizeGb"]

[[types]]
schema = "InstancesSetMachineTypeRequest"
include_fields = ["machineType"]

[types.field_overrides]

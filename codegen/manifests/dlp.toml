# Cloud Data Loss Prevention (DLP) API - Codegen Manifest
# Operations needed for GCP CIS benchmark checks:
#   - bq_data_classification (CIS 7.4): verify Sensitive Data Protection is
#     configured and scanning BigQuery datasets for sensitive data.

[api]
name = "dlp"
display_name = "Cloud DLP API"
version = "v2"
discovery_url = "https://www.googleapis.com/discovery/v1/apis/dlp/v2/rest"
base_url = "https://dlp.googleapis.com"
doc_url = "https://cloud.google.com/sensitive-data-protection/docs/"

[api.client]
accessor_name = "dlp"
client_struct = "DlpClient"

# --- Types ---

[[types]]
schema = "GooglePrivacyDlpV2SensitivityScore"
rust_name = "DlpSensitivityScore"
include_fields = ["score"]

[[types]]
schema = "GooglePrivacyDlpV2DataRiskLevel"
rust_name = "DlpDataRiskLevel"
include_fields = ["score"]

[[types]]
schema = "GooglePrivacyDlpV2DiscoveryConfig"
rust_name = "DiscoveryConfig"
include_fields = ["name", "displayName", "status", "createTime", "updateTime", "lastRunTime"]

[types.field_overrides]
name = { required = true }

[[types]]
schema = "GooglePrivacyDlpV2ProjectDataProfile"
rust_name = "ProjectDataProfile"
include_fields = ["name", "projectId", "profileLastGenerated", "sensitivityScore", "dataRiskLevel", "tableDataProfileCount", "fileStoreDataProfileCount"]

[types.field_overrides]
name = { required = true }

# --- Operations ---

[[operations]]
discovery_method = "projects.locations.discoveryConfigs.list"
rust_name = "list_discovery_configs"
description = "List Sensitive Data Protection discovery configurations for a project location."
query_params = ["pageSize", "pageToken", "orderBy"]
list_response = { type_name = "GooglePrivacyDlpV2ListDiscoveryConfigsResponse", items_field = "discoveryConfigs", item_type = "DiscoveryConfig" }

[[operations]]
discovery_method = "projects.locations.projectDataProfiles.list"
rust_name = "list_project_data_profiles"
description = "List project-level data profiles generated by Sensitive Data Protection scans."
query_params = ["pageSize", "pageToken", "orderBy", "filter"]
list_response = { type_name = "GooglePrivacyDlpV2ListProjectDataProfilesResponse", items_field = "projectDataProfiles", item_type = "ProjectDataProfile" }
